<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  
  <!-- PWA Meta Tags -->
  <meta name="theme-color" content="#2563eb" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Hatzolah CPG" />
  
  <!-- Icons -->
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <link rel="apple-touch-icon" sizes="152x152" href="/icon-152.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/icon-180.png" />
  <link rel="apple-touch-icon" sizes="167x167" href="/icon-167.png" />
  
  <!-- Manifest — %BASE_URL% so it resolves under the GitHub Pages sub-path
       (/hatzolah-cpg/) in production and at / in dev, instead of 404ing. -->
  <link rel="manifest" href="%BASE_URL%manifest.json" />
  
  <!-- SEO -->
  <meta name="description" content="Hatzolah Clinical Practice Guidelines - Emergency medical reference with fuzzy search functionality" />
  <meta name="keywords" content="medical, emergency, clinical guidelines, hatzolah, first aid, search" />
  
  <title>Hatzolah Clinical Practice Guidelines</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Tailwind Config -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#2563eb',
          }
        }
      }
    }
  </script>
</head>
<body>
  <div id="root"></div>
  
  <!-- Service Worker Registration -->
  <script>
    // Skip the service worker on localhost — its cache otherwise serves stale
    // assets during local dev/preview, masking code changes. PWA still active in prod.
    var isLocalhost = ['localhost', '127.0.0.1', '[::1]'].includes(location.hostname);
    if ('serviceWorker' in navigator && !isLocalhost) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('service-worker.js')
          .then(function(registration) {
            console.log('SW registered: ', registration);
          }).catch(function(registrationError) {
            console.log('SW registration failed: ', registrationError);
          });
      });
    }
    
    // PWA Install Prompt
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
      deferredPrompt = e;
      // Show install button if needed
      console.log('PWA install prompt available');
    });
  </script>
  
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
